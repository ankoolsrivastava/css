<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font</title>
    <style>
        .font {
            font-size: 24px;
            font-weight: 500;
            font-style: italic;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif, serif;
        }
        #second {
            font-size: 18px;
            font-weight: 900;
            font-style: normal;
            font-family: 'Arial', sans-serif;
        }

    </style>
</head> 
<body>
    <p class="font">This is a paragraph with a font size of 24 pixels.</p>
    <p id="second">This is another paragraph with a different font size.</p>
</body>
</html>
