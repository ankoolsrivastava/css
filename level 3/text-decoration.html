<!DOCTYPE html>
<html>
    <head>
        <title>Text-decoration</title>
        <style>
            #underline {
                /* background-color: red; */
                text-decoration: underline;
                text-decoration-style: wavy;
                text-decoration-color:green;
                height: 50px;
                width: 100px;
                
            }
            #overline {
                /* background-color: green; */
                text-decoration: overline;
                text-decoration-color: red;
                text-decoration-style:dotted;
                height: 50px;
                width: 100px;   
                
            }
            #line-through {
                /* background-color: blue; */
                text-decoration: line-through;
                text-decoration-color: yellow;
                text-decoration-style: dashed;
                height: 50px;
                width: 100px;
                
            }
        </style>
    </head>
    <body>
        <p id="underline">This text is underlined.</p>
        <p id="overline">This text has an overline.</p>
        <p id="line-through">This text has a line through it.</p>
        <a href="#">This is a link.</a><br>
        <a href="#" style="text-decoration: none">This link has no text decoration.</a>
    </body>
