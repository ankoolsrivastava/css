<!doctype html>
<html>
    <Head>
        <title>Text-align</title>
        <style>
            
            #left{
                background-color: red;
                text-align: left;
                height: 50px;
                width: 100px;
            }
            #center{
                background-color: green;
                text-align: center;
                height: 50px;
                width: 100px;   
            }
            #right{
                background-color: blue;
                text-align: right;
                height: 50px;
                width: 100px;
            }
            }
        </style>
    </Head>
    <Body>
        <p id="left">This text is left-aligned.</p>
        <p id="center">This text is center-aligned.</p>
        <p id="right">This text is right-aligned.</p>
    </Body>
</html>
