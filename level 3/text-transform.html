<!doctype html>
<html>
    <head>
        <title>Text Transform</title>
        <style>
            #capitalize {
                text-transform: capitalize;
            }
            #uppercase {
                text-transform: uppercase;
            }
            #lowercase {
                text-transform: lowercase;
            }
            #None {
                text-transform: none;
            }

        </style>    
        <body>
            <p id="capitalize">this text will be capitalized.</p>
            <p id="uppercase">this text will be uppercase.</p>
            <p id="lowercase">THIS TEXT WILL BE LOWERCASE.</p>
            <p id="None">This is a paragraph with normal text transformation.</p>
        </body>
    </head>
