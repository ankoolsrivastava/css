<!Doctype html>
<html lang="en">
<head>
    
    <title>Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #box1{
            width: 100px;
            height: 100px;
            margin  : 20px;
            border  : 10px solid black;
            background-color: red;
            position: static;
            top : 100px;
            left: 170px;
        }
        #box2{
            width: 100px;
            height: 100px;
            margin  : 20px;
            border  : 10px solid black;
            background-color: green;
            position: relative;
            top : 50px;
            left: 300px;
        }
        #box3{
            width: 100px;
            height: 100px;
            margin  : 20px;
            border:10px solid black;
            background-color: blue;
            position: fixed;
            top: 100px;
            left:170px;
        }
        #box4{
            width: 100px;
            height: 100px;
            margin  : 20px;
            border:10px solid black;
            background-color: yellow;
            position: absolute;
            top: 250px;
            left: 170px;

        }
        </style>
  </head>
  <body>
    
        <div id="box1">static</div>
        <div id="box2">relative</div>
        <div id="box3">fixed</div>
        <div id="box4">absolute</div>

   
  </body>  
</html>
