<!doctype html>
<html>
    <head>
        <title>Box Model</title>
        <style>
            
            .box{
                border:5px solid black;
                height:50px;
                width:50px;
                margin: 30px; ;
                text-align:center;
                padding: 10px ;
                border-radius:10px;
                
            }
            #first{
                background-color:greenyellow;

            
            }
            #second{
                background-color:hotpink;
            }
        </style>
    </head>
    <body>
        <div id="first" class="box">
            <p>First</p>
        </div>
        <div id="second" class="box">
            <p>Second</p>
        </div>
    </body>
</html>
