<!DOCTYPE html>

<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height and Width</title>
    <style> 
        .handw {
            width: 200px;
            height: 100px;
        }
        #p1 {
            background-color:aqua;
        }
        #div1 {
            background-color: lightcoral;
        }
        #h1 {
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1 id="h1" class="handw">Height and Width</h1>

    <div id="div1" class="handw">
        This div has a width of 200 pixels and a height of 100 pixels.
    </div>
    <p  id="p1" class="handw">
        This paragraph has a width of 300 pixels and a height of 50 pixels.
    </p>
</html>
