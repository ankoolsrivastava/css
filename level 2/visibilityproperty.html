<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CSS: visibility property</title>
  <style>
    #hidden {
        background-color: brown;
        visibility: hidden;
        height: 50px;
        width: 200px;
    }
   #visible {
        background-color: green;
        visibility: visible;
        height: 50px;
        width: 200px;
    }
  </style>
</head>
<body>
  <div id="hidden">This element is hidden but still takes up space.</div>
  <div id="visible">This element is visible.</div>

</body>
</html>
